name: "baseline_v1"
description: "39特征（不含行业特征） + 4层Transformer + liquid100选股"

data:
  stock_list: "liquid100"
  start_date: "2015-01-01"
  end_date: "2025-12-31"
  cache_dir: "outputs/data_cache"
  indexes: ["000300"]

features:
  type: "v1_45"
  seq_len: 120
  feature_dim: 39

labels:
  target: "future_mean_return"
  periods: [5, 20]
  buckets:
    5d:  [-0.10, -0.07, -0.05, -0.03, -0.01, 0.01, 0.03, 0.05, 0.07, 0.10]
    20d: [-0.25, -0.18, -0.12, -0.08, -0.03, 0.03, 0.08, 0.12, 0.18, 0.25]

preprocessing:
  winsorize_pct: [0.01, 0.99]
  normalization: "zscore"

model:
  type: "transformer"
  d_model: 128
  n_heads: 4
  n_layers: 4
  d_ff: 256
  dropout: 0.20

training:
  batch_size: 2048
  data_parallel: true
  mixed_precision: true
  num_workers: 4
  prefetch_factor: 4
  epochs: 100
  lr: 0.0001
  weight_decay: 0.0001
  gradient_clip: 1.0
  warmup_epochs: 5
  loss_weights: {5d: 0.6, 20d: 0.4}
  early_stopping_patience: 15

data_split:
  train_end: "2022-12-31"
  val_end:   "2023-12-31"

backtest:
  type: "event_driven"
  initial_cash: 1000000
  top_k: 50
  rebalance: "daily"
  scoring_weights: {5d: 0.6, 20d: 0.4}
  risk:
    max_positions: 30
    single_pct: 0.05
    stop_loss: 0.08
