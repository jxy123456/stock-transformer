project:
  name: "stock_transformer"
  version: "0.2.0"

data:
  source: "tushare"
  tushare_token: "8b175c44de6cbb39ab31a390b1eada13d83191491743a1ed2883f154"
  symbols: ["000001", "600519", "000858"]
  index: "000300"
  start_date: "20150101"
  end_date: "20260515"
  adjust: "qfq"
  cache_dir: "outputs/data_cache"
  cache_expiry_hours: 24

features:
  num_features: 80
  bucket_type: "5d"

preprocessing:
  warmup_rows: 250
  winsorize_sigma: 5.0

model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  d_ff: 1024
  dropout: 0.15
  seq_len: 250
  num_classes: 8
  pred_len: 5
  pos_encoding: "sinusoidal"
  pooling: "attention"

training:
  lr: 0.0003
  weight_decay: 0.01
  batch_size: 32
  epochs: 80
  early_stopping_patience: 20
  gradient_clip_norm: 1.0
  loss: "cross_entropy"
  scheduler: "cosine_warmup"
  warmup_epochs: 5
  walk_forward:
    train_window: 1000
    val_window: 200
    test_window: 100
    step: 100
  normalization: "zscore"
  normalize_per_fold: true

backtest:
  initial_cash: 1000000
  commission_rate: 0.0003
  stamp_tax_rate: 0.001
  min_commission: 5.0
  slippage_bps: 5
  benchmark: "000300"
  risk_free_rate: 0.02

strategy:
  buy_threshold: 0.005
  sell_threshold: -0.005
  sizing_method: "vol_adjusted"
  max_position_pct: 0.20

risk:
  max_positions: 5
  max_position_pct: 0.25
  max_drawdown_pct: 0.15
  reduce_at_pct: 0.10
  stop_loss_pct: 0.08
  take_profit_pct: 0.15
  trailing_stop_pct: 0.05
  max_sector_pct: 0.40
